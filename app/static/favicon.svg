<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151a22"/>
      <stop offset="100%" stop-color="#232a36"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD76A"/>
      <stop offset="100%" stop-color="#F6A91A"/>
    </linearGradient>

    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C07BFF"/>
      <stop offset="100%" stop-color="#8E52FF"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74E2FF"/>
      <stop offset="100%" stop-color="#36A9FF"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity=".35"/>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity=".25"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="34" fill="url(#bg)"/>
  <rect x="3" y="3" width="122" height="122" rx="31" fill="none" stroke="rgba(255,255,255,.08)"/>

  <g filter="url(#shadow)">
    <rect x="28" y="31" width="48" height="58" rx="10" fill="url(#gold)"/>
    <rect x="40" y="40" width="48" height="58" rx="10" fill="url(#purple)"/>
    <rect x="52" y="49" width="48" height="58" rx="10" fill="url(#blue)"/>
  </g>

  <g filter="url(#soft)">
    <rect x="28" y="31" width="48" height="58" rx="10" fill="none" stroke="rgba(255,255,255,.18)"/>
    <rect x="40" y="40" width="48" height="58" rx="10" fill="none" stroke="rgba(255,255,255,.16)"/>
    <rect x="52" y="49" width="48" height="58" rx="10" fill="none" stroke="rgba(255,255,255,.14)"/>
  </g>

  <path d="M18 14 C34 6, 60 8, 88 18" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="5" stroke-linecap="round"/>
  <rect x="10" y="10" width="108" height="40" rx="20" fill="url(#shine)" opacity=".16"/>
</svg>
