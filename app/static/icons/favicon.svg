<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121722"/>
      <stop offset="100%" stop-color="#1d2330"/>
    </linearGradient>

    <radialGradient id="ambient" cx="18%" cy="14%" r="90%">
      <stop offset="0%" stop-color="#8B5DFF" stop-opacity=".20"/>
      <stop offset="38%" stop-color="#4EA1FF" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD76A"/>
      <stop offset="100%" stop-color="#F6A91A"/>
    </linearGradient>

    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C07BFF"/>
      <stop offset="100%" stop-color="#8E52FF"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74E2FF"/>
      <stop offset="100%" stop-color="#36A9FF"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity=".38"/>
    </filter>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7C5CFF" flood-opacity=".32"/>
    </filter>

    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="30" fill="url(#bg)"/>
  <rect width="128" height="128" rx="30" fill="url(#ambient)"/>
  <rect x="4" y="4" width="120" height="120" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity=".07"/>

  <path d="M20 16 C36 8, 61 10, 89 20" fill="none" stroke="#FFFFFF" stroke-opacity=".14" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#glow)" opacity=".95">
    <rect x="24" y="26" width="54" height="64" rx="12" fill="url(#gold)"/>
    <rect x="36" y="35" width="54" height="64" rx="12" fill="url(#purple)"/>
    <rect x="48" y="44" width="54" height="64" rx="12" fill="url(#blue)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="24" y="26" width="54" height="64" rx="12" fill="url(#gold)"/>
    <rect x="36" y="35" width="54" height="64" rx="12" fill="url(#purple)"/>
    <rect x="48" y="44" width="54" height="64" rx="12" fill="url(#blue)"/>
  </g>

  <g filter="url(#soft)">
    <rect x="24.5" y="26.5" width="53" height="63" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity=".18"/>
    <rect x="36.5" y="35.5" width="53" height="63" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity=".16"/>
    <rect x="48.5" y="44.5" width="53" height="63" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity=".14"/>
  </g>

  <rect x="10" y="10" width="108" height="38" rx="19" fill="url(#shine)" opacity=".16"/>
</svg>