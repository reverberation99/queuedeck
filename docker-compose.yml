services:
  queuedeck-dev:
    image: python:3.12-slim
    container_name: queuedeck-dev
    working_dir: /app
    volumes:
      - ./app:/app/app
      - ./data:/data
    environment:
      HOST: "0.0.0.0"
      PORT: "7071"
      APP_NAME: "QueueDeck v1-dev"

      # Security/session
      SECRET_KEY: "${SECRET_KEY}"
      QD_ADMIN_USER: "${QD_ADMIN_USER}"
      QD_ADMIN_PASS: "${QD_ADMIN_PASS}"

#      SECRET_KEY: "jkfldalieafldajfeliajfldkasjfea"
      DB_PATH: "/data/queuedb.sqlite"
#      QD_ADMIN_USER: "remy"
#      QD_ADMIN_PASS: "whowhatwhenwherehownow"
    command: sh -lc "pip -q install --no-cache-dir flask requests && python -m app"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7071/health').read()\""]
      interval: 5s
      timeout: 2s
      retries: 20
    ports:
      - "7072:7071"
    restart: unless-stopped
